/* ===== 공용 Spotify 스크러버 척도 (design.md: pill 트랙 + 원형 노브 + 그린 기능색 / 시맨틱 경고색) =====
   polarity: 'neutral'(극성 없음·그린만) | 'badHigh'(오른쪽=나쁨) | 'badLow'(왼쪽=나쁨)

function lerpHex(a,b,t){const pa=[1,3,5].map(i=>parseInt(a.slice(i,i+2),16)),pb=[1,3,5].map(i=>parseInt(b.slice(i,i+2),16));return '#'+pa.map((v,i)=>Math.round(v+(pb[i]-v)*t).toString(16).padStart(2,'0')).join('');}
function sevColor(t){t=Math.max(0,Math.min(1,t));return t<=.5?lerpHex('#1db954','#ffa42b',t/.5):lerpHex('#ffa42b','#f3727f',(t-.5)/.5);}
function SCRUB(o){
  const val=(o.val==null?-1:o.val),max=o.max||10,ticks=o.ticks||[],left=o.left||'',right=o.right||'',pol=o.polarity||'neutral',reverse=!!o.reverse,fmt=o.fmt||(v=>v),empty=o.empty||'탭하여 선택';
  const PAD=5; // 점(작은 틱)용 인셋
  const KR=9;  // 노브 반경(18px) — 끝에서도 트랙 안에 들어오게
  const ins=p=>`calc(${p}% + ${(PAD - p*PAD/50).toFixed(2)}px)`;
  const insK=p=>`calc(${p}% + ${(KR - p*KR/50).toFixed(2)}px)`;
  const tk=ticks.map(p=>`<span class="wd-tick" style="left:${ins(p)}"></span>`).join('');
  const ends=`<div class="wd-ends"><span>${left}</span><span>${right}</span></div>`;
  if(val<0){return `<div class="wd-svwrap"><span class="wd-sv empty">${empty}</span></div><div class="wd-scrub"><div class="wd-track"></div>${tk}</div>${ends}`;}
  const frac=val/max, pos=Math.max(0,Math.min(100,(reverse?1-frac:frac)*100));
  let knob,fill,txt;
  if(pol==='neutral'){knob='#1db954';fill='#1db954';txt='#121212';}
  else{const bad=pol==='badHigh'?frac:(1-frac);const c=sevColor(bad);knob=c;txt=lerpHex(c,'#000000',.30);const startC=pol==='badHigh'?'#1db954':sevColor(1);fill=`linear-gradient(90deg,${startC},${c})`;}
  return `<div class="wd-svwrap"><span class="wd-sv" style="color:${txt}">${fmt(val)}</span></div><div class="wd-scrub"><div class="wd-track"></div><div class="wd-fill" style="width:${insK(pos)};background:${fill}"></div>${tk}<div class="wd-knob" style="left:${insK(pos)};background:${knob}"></div></div>${ends}`;
}

function loadFile(file){if(cache[file])return cache[file];cache[file]=new Promise(res=>{const ifr=document.createElement('iframe');ifr.style.cssText='position:fixed;left:-9999px;top:0;width:1600px;height:1600px;visibility:hidden';let done=false;const fin=v=>{if(done)return;done=true;try{document.body.removeChild(ifr)}catch(e){}res(v)};document.body.appendChild(ifr);ifr.onload=()=>{try{const d=ifr.contentDocument;const styles=[...d.querySelectorAll('style')].map(s=>s.textContent).join('\n');let ns=[...d.querySelectorAll(SEL)];ns.forEach(n=>{n.style.minHeight='0';n.style.height='auto'});ns=ns.filter(n=>{const r=n.getBoundingClientRect();return r.height>=200&&r.width>=200});const screens=ns.map(n=>{const r=n.getBoundingClientRect();return{html:n.outerHTML,w:Math.round(r.width)||375,h:Math.round(r.height)||667}});fin({styles,screens})}catch(e){fin({styles:'',screens:[]})}};ifr.onerror=()=>fin({styles:'',screens:[]});ifr.src=('uploads/'+file).normalize('NFD');setTimeout(()=>fin({styles:'',screens:[]}),8000)});return cache[file];}
function asisCard(scr,styles){const W=300,scale=W/scr.w,minH=Math.round(scr.w*16/9),natH=Math.max(scr.h,minH),thumbH=Math.round(natH*scale);const doc='<!DOCTYPE html><html><head><meta charset="utf-8"><link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet"><style>*{box-sizing:border-box}html,body{margin:0!important;padding:0!important;background:#fff;overflow:hidden}'+styles+'.ph,.phone{margin:0!important;border-radius:0!important;box-shadow:none!important;border:none!important;height:auto!important;min-height:'+minH+'px!important}html{filter:grayscale(1) contrast(.95)!important}</style></head><body>'+scr.html+'</body></html>';const fr=document.createElement('div');fr.className='pframe asisf';fr.style.cssText='width:'+W+'px;height:'+thumbH+'px';fr.innerHTML='<iframe scrolling="no" style="width:'+scr.w+'px;height:'+natH+'px;zoom:'+scale+'"></iframe>';fr.querySelector('iframe').srcdoc=doc;return fr;}

function ListRow({icon,title,sub='',value='',chevron=true,danger=false,attr=''}){const t=sub?`<span class="t"><span style="display:block">${title}</span><span style="display:block;font-size:12px;color:var(--lborder);font-weight:500;margin-top:2px">${sub}</span></span>`:`<span class="t">${title}</span>`;return `<div class="sp-lrow${danger?' logout':''}"${attr?' '+attr:''}><span class="ic">${I[icon]||''}</span>${t}${value?`<span class="x">${value}</span>`:''}${chevron&&!danger?`<span class="chev">${I.chev}</span>`:''}</div>`;}
const List=(rows,style='')=>`<div class="sp-list"${style?` style="${style}"`:''}>${rows.join('')}</div>`;
function TopBar({title,back=true,trailing='<span style="width:30px"></span>'}){return `<div class="sp-top">${back?`<span class="ico">${I.back}</span>`:''}<span class="ttl">${title}</span>${trailing}</div>`;}

/* ===== 컴포넌트 라이브러리 빌드 ===== */
function buildLibrary(){
  const card=(nm,fn,cd,specs)=>`<div class="libcard"><div class="ch"><span class="nm">${nm}</span><span class="fn">${fn}</span></div><div class="cd">${cd}</div><div class="spec">${specs.map(s=>`<div class="spec-row"><span class="vl">${s[0]}</span><div class="ph lt${s[2]?' '+s[2]:''}">${s[1]}</div></div>`).join('')}</div></div>`;
  document.getElementById('lib').innerHTML=[
    card('Button','Button()','알약형 CTA. 모양·강조색 토큰을 따릅니다.',[['primary / out',ButtonRow([Button({label:'시작'}),Button({label:'이전',variant:'out'})])],['dark / disabled',ButtonRow([Button({label:'다시',variant:'dark'}),Button({label:'준비 중',variant:'dis'})])],['full width',Button({label:'설문 시작하기'})]]),
    card('Track','Track()','커버 아트 리스트 행. 트레일링 교체 가능.',[['chev',Track({cover:'care',title:'안전한 환경 조성',subtitle:'일상에서의 돌봄'}),'pad-sm'],['rt(now)',Track({cover:'eq5d',title:'EQ-5D-3L 건강상태',subtitle:'회상기간 · 오늘',green:true,trailing:{type:'rt',state:'now',text:'지금'}}),'pad-sm'],['act',Track({cover:'bmi',title:'BMI 체질량지수',subtitle:'키·몸무게 입력',trailing:{type:'act',text:'측정'}}),'pad-sm'],['due',Track({cover:'qor',title:'QoR-15K 회복의 질',subtitle:'지난 24시간',trailing:{type:'due',text:'마감 1일'}}),'pad-sm']]),
    card('ListRow','ListRow()','아이콘 메뉴 행. 부제·값·위험 옵션.',[['value',List([ListRow({icon:'chart',title:'응답 이력',value:'QoR 추이'})]),'pad-sm'],['sub + value',List([ListRow({icon:'bell',title:'알림 설정',sub:'푸시 수신 · 유형별',value:'켜짐'})]),'pad-sm'],['danger',List([ListRow({icon:'logout',title:'로그아웃',danger:true})]),'pad-sm']]),
    card('TopBar','TopBar()','상단 네비. 뒤로가기 + 타이틀.',[['back + title',TopBar({title:'QoR-15K · 회복의 질'})],['no back',TopBar({title:'설정',back:false})]]),
    card('TabBar','TABS()','하단 4탭.',[['active: 0',TABS(0)],['active: 3',TABS(3)]]),
  ].join('');
}

/* ===== 마스터 컴포넌트 (사용자가 Edit/Markup으로 직접 수정) ===== */
function buildMasters(){
  const m=(id,label,sub,inner,cls='')=>`<div class="mcard"><div class="ml">${label}<span>${sub}</span></div><div class="ph lt${cls}" id="${id}">${inner}</div></div>`;
  const sec=(title,cards)=>`<div class="msec"><div class="msec-h">${title}</div><div class="masters">${cards.join('')}</div></div>`;
  document.getElementById('masters').innerHTML=
    sec('버튼',[
      m('m-primary','기본','.sp-cta',Button({label:'설문 시작하기',attr:'data-master="btn"'})),
      m('m-out','보조 (아웃라인)','.sp-cta.out',Button({label:'돌봄 찾아보기',variant:'out',attr:'data-master="btn-out"'})),
      m('m-danger','위험','.sp-cta.danger',Button({label:'동의 철회하기',variant:'danger',attr:'data-master="btn-danger"'})),
      m('m-dis','비활성','.sp-cta.dis',Button({label:'준비 중',variant:'dis',attr:'data-master="btn-dis"'})),
      m('m-act','액션','.sp-act','<span class="sp-act" data-master="btn-act">측정</span>',' pad-sm'),
      m('m-tl','피처드','.tl-cta',`<div class="tl-cta" data-master="btn-tl">${I.play} 설문 시작</div>`),
    ])+
    sec('칩 · 토글',[
      m('m-chip-on','칩 — 선택','.sp-chip.on',`<div class="sp-chips"><span class="sp-chip on" data-master="chip-on">돌봄콘텐츠</span></div>`,' pad-sm'),
      m('m-chip','칩 — 미선택','.sp-chip',`<div class="sp-chips"><span class="sp-chip" data-master="chip">건강정보</span></div>`,' pad-sm'),
    ])+
    sec('리스트',[
      m('m-track','리스트 행','.trk',Track({cover:'qor',title:'QoR-15K 회복의 질',subtitle:'회상기간 · 지난 24시간',green:true,trailing:{type:'rt',state:'now',text:'지금'},attr:'data-master="track"'}),' pad-sm'),
      m('m-row','메뉴 행','.sp-lrow',List([ListRow({icon:'bell',title:'알림 설정',value:'켜짐',attr:'data-master="row"'})]),' pad-sm'),
    ])+
    sec('색',[
      m('m-accent','강조 색','전역 그린','<div class="swatch" data-master="accent"></div>'),
    ]);
}

/* ===== 라이브 동기화 — 마스터의 스타일을 모든 인스턴스로 복제 + 탭 전환 ===== */
function dsxInit(){
  const root=document.documentElement;
  /* read=마스터 선택자, write=모든 인스턴스 선택자, props=복제할 속성 */
  const SYNC=[
    {read:'[data-master="btn"]',write:'#panel-screens .ph .sp-cta:not(.out):not(.dark):not(.dis):not(.danger)',props:['background-color','color','border-radius']},
    {read:'[data-master="btn-out"]',write:'#panel-screens .ph .sp-cta.out',props:['background-color','color','border-color','border-radius']},
    {read:'[data-master="btn-danger"]',write:'#panel-screens .ph .sp-cta.danger',props:['background-color','color','box-shadow','border-radius']},
    {read:'[data-master="btn-dis"]',write:'#panel-screens .ph .sp-cta.dis',props:['background-color','color','border-radius']},
    {read:'[data-master="btn-act"]',write:'#panel-screens .ph .sp-act',props:['background-color','color','border-radius']},
    {read:'[data-master="btn-tl"]',write:'#panel-screens .ph .tl-cta',props:['background-color','color','border-radius']},
    {read:'[data-master="chip"]',write:'#panel-screens .ph .sp-chip:not(.on)',props:['background-color','color','border-radius']},
    {read:'[data-master="chip-on"]',write:'#panel-screens .ph .sp-chip.on',props:['background-color','color','border-radius']},
    {read:'[data-master="track"] .cv',write:'#panel-screens .ph .trk .cv',props:['border-radius']},
    {read:'[data-master="row"] .ic',write:'#panel-screens .ph .sp-lrow .ic',props:['background-color','color','border-radius']},
  ];
  const sync=document.getElementById('dsx-sync');
  function tick(){
    let css='';
    /* 강조 색: 스와치 배경 → 전역 --green/--greenD */
    const sw=document.querySelector('[data-master="accent"]');
    if(sw){const c=getComputedStyle(sw).backgroundColor;if(c&&c!=='rgba(0, 0, 0, 0)'){root.style.setProperty('--green',c);root.style.setProperty('--greenD',c);document.body.classList.add('ds-recolor');}}
    for(const s of SYNC){const el=document.querySelector(s.read);if(!el)continue;const cs=getComputedStyle(el);const decl=s.props.map(p=>p+':'+cs.getPropertyValue(p)+'!important').join(';');if(decl)css+=s.write+'{'+decl+'}\n';}
    if(sync.textContent!==css)sync.textContent=css;
  }
  tick();setInterval(tick,500);
  document.querySelectorAll('.dsx-tab').forEach(tab=>tab.addEventListener('click',()=>{document.querySelectorAll('.dsx-tab').forEach(t=>t.classList.remove('on'));tab.classList.add('on');document.querySelectorAll('.dsx-panel').forEach(p=>p.classList.remove('on'));document.getElementById('panel-'+tab.dataset.panel).classList.add('on');}));
}

const board=document.getElementById('panel-screens');
(async()=>{
  function toBeCard(i,num){
    const s=META[i];
    const inner=SB+SP[i]+(s.tab!==undefined?TABS(s.tab):'');
    const lt=document.createElement('div');lt.className='col';
    lt.innerHTML='<div class="ccap">'+num+' · '+s.lab+'</div><div class="pframe lt" style="width:300px"><div class="ph tall lt">'+inner+'</div></div>';
    return lt;
  }
  function section(title,note){
    const sec=document.createElement('div');sec.className='grp';
    sec.innerHTML='<div class="grp-head"><span class="grp-title">'+title+'</span><span class="grp-note">'+note+'</span></div><div class="grp-rule"></div><div class="grid4"></div>';
    board.appendChild(sec);
    return sec.querySelector('.grid4');
  }
  // ===== 홈화면 (맨 위 분류) =====
  const homeGrid=section('홈화면','기관별 홈 화면 분류');
  const HOME=[11,10,13,9]; // 새봄 ACP · 서울대 돌봄가이드 · 메인 홈·원주 · 신촌경희 자가진단
  HOME.forEach((i,k)=>homeGrid.appendChild(toBeCard(i,String(k+1).padStart(2,'0'))));
  // ===== 설문 =====
  const surveyGrid=section('설문','설문 문항 화면 분류');
  const SURVEY=[25,8,3,17,4,16,15,19,20]; // 설문 안내·동의 · 설문홈·오늘 · 설문·척도 · QoR 카드형 · 설문·옵션 · EQ-5D VAS · WHODAS 다문항 · ACP 자유서술 · ACP 서명
  SURVEY.forEach((i,k)=>surveyGrid.appendChild(toBeCard(i,String(k+1).padStart(2,'0'))));
  // ===== 리스트형 =====
  const listGrid=section('리스트형','메뉴·항목 리스트 화면');
  const LIST=[7,21,22,23,14,24]; // 마이 · 동의 관리 · 설정 홈 · 알림 설정 · 글자크기·접근성 · 약관·정보
  LIST.forEach((i,k)=>listGrid.appendChild(toBeCard(i,String(k+1).padStart(2,'0'))));
  // ===== 결과형 — 점수 히어로 카드 =====
  const resultGrid=section('결과형 — 점수 히어로 카드','점수/지수 히어로 + 결과 카드');
  const RESULT=[18,5,6]; // BMI 결과 · 설문 결과 · 의향서 보관
  RESULT.forEach((i,k)=>resultGrid.appendChild(toBeCard(i,String(k+1).padStart(2,'0'))));
  // ===== 자가진단 =====
  const selfGrid=section('자가진단','자가진단 화면');
  const SELF=[12]; // 신촌 자가진단홈
  SELF.forEach((i,k)=>selfGrid.appendChild(toBeCard(i,String(k+1).padStart(2,'0'))));
  // ===== 콘텐츠 =====
  const contentGrid=section('콘텐츠','콘텐츠 목록·상세 화면');
  const CONTENT=[1,2]; // 콘텐츠 · 콘텐츠 상세
  CONTENT.forEach((i,k)=>contentGrid.appendChild(toBeCard(i,String(k+1).padStart(2,'0'))));
  // ===== 오늘 할 일 =====
  const todayGrid=section('오늘 할 일','오늘 할 일 화면');
  const TODAY=[0]; // 오늘 할 일
  TODAY.forEach((i,k)=>todayGrid.appendChild(toBeCard(i,String(k+1).padStart(2,'0'))));
})();
buildMasters();
dsxInit();
</script>
